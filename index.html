<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교생활 MBTI 테스트</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard',sans-serif;
}

body{
    background:linear-gradient(135deg,#dff4ff,#cfe9ff,#b9ddff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#4d7dc7;
    margin-bottom:15px;
}

.sub{
    text-align:center;
    color:#6d8ebd;
    margin-bottom:30px;
}

.progress{
    width:100%;
    height:10px;
    background:#e8f3ff;
    border-radius:50px;
    overflow:hidden;
    margin-bottom:30px;
}

.bar{
    width:0%;
    height:100%;
    background:#77b7ff;
    transition:.3s;
}

.question{
    font-size:24px;
    font-weight:bold;
    color:#4d6fa8;
    text-align:center;
    margin-bottom:40px;
    min-height:80px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    margin:12px 0;
    cursor:pointer;
    font-size:18px;
    transition:.25s;
}

.btnA{
    background:#bfe3ff;
}

.btnA:hover{
    background:#9fd2ff;
    transform:translateY(-2px);
}

.btnB{
    background:#d8efff;
}

.btnB:hover{
    background:#bfe3ff;
    transform:translateY(-2px);
}

.result{
    display:none;
    text-align:center;
}

.mbti{
    font-size:60px;
    color:#4b83d9;
    margin:25px 0;
    font-weight:bold;
}

.desc{
    font-size:19px;
    line-height:1.8;
    color:#555;
}

.restart{
    background:#73b6ff;
    color:white;
    margin-top:35px;
}

.restart:hover{
    background:#579ef0;
}
</style>

</head>
<body>

<div class="container">

<div id="test">

<h1>🏫 학교생활 MBTI 테스트</h1>
<p class="sub">학교에서의 생활만으로 알아보는 나의 MBTI!</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="question" id="question"></div>

<button class="btnA" onclick="choose('A')" id="btnA"></button>
<button class="btnB" onclick="choose('B')" id="btnB"></button>

</div>

<div class="result" id="result">

<h2>당신의 학교생활 MBTI는</h2>

<div class="mbti" id="mbti"></div>

<p class="desc" id="desc"></p>

<button class="restart" onclick="location.reload()">
다시 테스트하기
</button>

</div>

</div>

<script>

const questions=[

{
q:"새 학기 첫날 나는?",
a:"먼저 친구들에게 말을 건다",
b:"누가 먼저 와주길 기다린다",
type:"EI"
},

{
q:"조별과제를 시작하면?",
a:"바로 역할을 정하고 계획을 세운다",
b:"일단 아이디어를 자유롭게 이야기한다",
type:"JP"
},

{
q:"시험공부는?",
a:"계획표를 만들어 차근차근 한다",
b:"마감 직전에 몰아서 한다",
type:"JP"
},

{
q:"수업시간에 선생님의 설명을 들을 때",
a:"구체적인 예시가 좋다",
b:"원리와 아이디어가 더 흥미롭다",
type:"SN"
},

{
q:"친구가 고민을 털어놓으면",
a:"공감부터 해준다",
b:"해결방법을 알려준다",
type:"TF"
},

{
q:"학교 축제에서는",
a:"무대나 행사에 적극 참여한다",
b:"구경하거나 소수 친구와 다닌다",
type:"EI"
},

{
q:"새로운 수행평가를 받으면",
a:"독창적인 아이디어가 떠오른다",
b:"기존 사례를 참고한다",
type:"SN"
},

{
q:"친구와 의견이 다를 때",
a:"논리적으로 토론한다",
b:"분위기를 먼저 생각한다",
type:"TF"
},

{
q:"점심시간에는",
a:"여러 친구들과 어울린다",
b:"친한 친구 몇 명과 있는다",
type:"EI"
},

{
q:"필기 스타일은?",
a:"깔끔하게 정리한다",
b:"필요한 것만 메모한다",
type:"JP"
},

{
q:"문제를 풀 때",
a:"정답이 맞는지 분석한다",
b:"느낌이나 경험을 활용한다",
type:"TF"
},

{
q:"학교에서 가장 좋아하는 수업은?",
a:"실험·토론처럼 새로운 활동",
b:"정리된 개념을 배우는 수업",
type:"SN"
}

];

let index=0;

let score={
E:0,I:0,
S:0,N:0,
T:0,F:0,
J:0,P:0
};

function showQuestion(){

const q=questions[index];

document.getElementById("question").innerHTML=q.q;
document.getElementById("btnA").innerHTML=q.a;
document.getElementById("btnB").innerHTML=q.b;

document.getElementById("bar").style.width=((index)/questions.length)*100+"%";

}

showQuestion();

function choose(answer){

const q=questions[index];

switch(q.type){

case "EI":
answer==="A"?score.E++:score.I++;
break;

case "SN":
answer==="A"?score.S++:score.N++;
break;

case "TF":
answer==="A"?score.F++:score.T++;
break;

case "JP":
answer==="A"?score.J++:score.P++;
break;

}

index++;

if(index<questions.length){
showQuestion();
}
else{
showResult();
}

}

function showResult(){

document.getElementById("bar").style.width="100%";

let result="";

result+=score.E>=score.I?"E":"I";
result+=score.S>=score.N?"S":"N";
result+=score.T>=score.F?"T":"F";
result+=score.J>=score.P?"J":"P";

document.getElementById("test").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("mbti").innerHTML=result;

const descriptions={

ISTJ:"📚 성실한 모범생! 계획을 세우고 책임감 있게 학교생활을 하는 타입입니다.",

ISFJ:"💙 친구들을 잘 챙기는 따뜻한 반장 스타일입니다.",

INFJ:"🌙 조용하지만 깊이 있는 생각으로 친구들에게 신뢰를 얻습니다.",

INTJ:"🧠 전략적으로 공부하며 목표를 이루는 학습형 리더입니다.",

ISTP:"🔧 실습이나 체험활동에서 뛰어난 문제 해결 능력을 보입니다.",

ISFP:"🎨 감성이 풍부하고 친구들과 편안한 분위기를 만드는 타입입니다.",

INFP:"🌸 이상과 꿈이 많은 따뜻한 학생입니다.",

INTP:"💡 호기심이 많고 새로운 지식을 탐구하는 스타일입니다.",

ESTP:"⚽ 활동적이고 학교행사에서 존재감이 큰 타입입니다.",

ESFP:"🎉 분위기 메이커! 친구들과 함께하는 시간을 가장 즐깁니다.",

ENFP:"✨ 아이디어가 넘치고 새로운 도전을 좋아합니다.",

ENTP:"🚀 토론과 발표에서 빛나는 창의적인 학생입니다.",

ESTJ:"🏆 책임감 있는 학생회장 스타일입니다.",

ESFJ:"😊 모두를 챙기며 협동을 중요하게 생각합니다.",

ENFJ:"🌟 친구들을 이끄는 따뜻한 리더입니다.",

ENTJ:"👑 목표를 향해 추진력이 강한 학교 리더형입니다."

};

document.getElementById("desc").innerHTML=descriptions[result];

}

</script>

</body>
</html>
