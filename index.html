<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>학교생활 MBTI 테스트</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Pretendard',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#dff4ff,#b9ddff);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:650px;
background:white;
border-radius:25px;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#4d7dc7;
}

.sub{
text-align:center;
color:#7192bd;
margin:15px 0 30px;
}

.progress{
height:10px;
background:#e8f3ff;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#70b5ff;
transition:.3s;
}

.question{
margin:35px 0;
text-align:center;
font-size:23px;
font-weight:bold;
color:#466fa8;
}

button{
width:100%;
padding:17px;
border:none;
border-radius:15px;
margin:10px 0;
font-size:17px;
cursor:pointer;
}

.btnA{
background:#bde2ff;
}

.btnB{
background:#d9efff;
}

button:hover{
transform:translateY(-2px);
}

.result{
display:none;
text-align:center;
}

.mbti{
font-size:60px;
font-weight:bold;
color:#4381d5;
margin:20px;
}

.desc{
font-size:18px;
line-height:1.8;
color:#555;
}

.job{
margin-top:25px;
background:#eaf5ff;
padding:25px;
border-radius:20px;
color:#456;
line-height:2;
}

.restart{
background:#70b5ff;
color:white;
margin-top:30px;
}

</style>

</head>


<body>

<div class="container">


<div id="test">

<h1>🏫 학교생활 MBTI 테스트</h1>

<p class="sub">
학교생활 속 나의 성격 유형 알아보기
</p>


<div class="progress">
<div class="bar" id="bar"></div>
</div>


<div class="question" id="question"></div>


<button class="btnA" id="btnA" onclick="choose('A')"></button>

<button class="btnB" id="btnB" onclick="choose('B')"></button>


</div>



<div class="result" id="result">


<h2>나의 학교생활 MBTI</h2>

<div class="mbti" id="mbti"></div>

<div class="desc" id="desc"></div>

<div class="job" id="job"></div>


<button class="restart" onclick="location.reload()">
🔄 다시 테스트하기
</button>


</div>


</div>


<script>


const questions=[

{
q:"새 학기 첫날 나는?",
a:"먼저 친구에게 말을 건다",
b:"조용히 상황을 지켜본다",
type:"EI"
},

{
q:"조별과제를 하면?",
a:"역할을 정하고 계획한다",
b:"아이디어부터 자유롭게 낸다",
type:"JP"
},

{
q:"시험 공부 스타일은?",
a:"계획표를 만들어 공부한다",
b:"마감 직전에 집중한다",
type:"JP"
},

{
q:"수업을 들을 때 더 중요한 것은?",
a:"구체적인 설명과 예시",
b:"새로운 생각과 가능성",
type:"SN"
},

{
q:"친구가 고민을 말하면?",
a:"해결 방법을 알려준다",
b:"먼저 공감해준다",
type:"TF"
},

{
q:"학교 축제에서는?",
a:"직접 참여한다",
b:"구경하는 편이다",
type:"EI"
},

{
q:"수행평가를 준비할 때?",
a:"새로운 아이디어를 낸다",
b:"검증된 방법을 사용한다",
type:"SN"
},

{
q:"친구와 의견이 다르면?",
a:"논리적으로 이야기한다",
b:"친구 기분을 생각한다",
type:"TF"
},

{
q:"점심시간에는?",
a:"여러 친구들과 함께한다",
b:"친한 친구와 조용히 있는다",
type:"EI"
},

{
q:"필기 스타일은?",
a:"깔끔하게 정리한다",
b:"중요한 것만 적는다",
type:"JP"
}

];


let index=0;


let score={
E:0,I:0,
S:0,N:0,
T:0,F:0,
J:0,P:0
};



function showQuestion(){

let q=questions[index];

question.innerHTML=q.q;
btnA.innerHTML=q.a;
btnB.innerHTML=q.b;

bar.style.width=
(index/questions.length)*100+"%";

}


showQuestion();



function choose(answer){

let q=questions[index];


if(q.type==="EI")
answer==="A"?score.E++:score.I++;

if(q.type==="SN")
answer==="A"?score.S++:score.N++;

if(q.type==="TF")
answer==="A"?score.T++:score.F++;

if(q.type==="JP")
answer==="A"?score.J++:score.P++;


index++;


if(index<questions.length){

showQuestion();

}else{

showResult();

}

}



function showResult(){


let result="";


result+=score.E>=score.I?"E":"I";
result+=score.S>=score.N?"S":"N";
result+=score.T>=score.F?"T":"F";
result+=score.J>=score.P?"J":"P";



const descriptions={

ISTJ:"📚 책임감 있고 계획적인 모범생 스타일입니다.",
ISFJ:"💙 친구를 잘 챙기는 따뜻한 학생입니다.",
INFJ:"🌙 생각이 깊고 조용한 리더형입니다.",
INTJ:"🧠 목표를 세우고 노력하는 전략가입니다.",
ISTP:"🔧 문제 해결 능력이 뛰어난 실용형입니다.",
ISFP:"🎨 감성이 풍부한 창의적인 학생입니다.",
INFP:"🌸 꿈과 상상력이 많은 타입입니다.",
INTP:"💡 호기심 많은 탐구형입니다.",
ESTP:"⚡ 활동적이고 도전을 좋아합니다.",
ESFP:"🎉 분위기를 밝게 만드는 타입입니다.",
ENFP:"✨ 아이디어와 에너지가 넘칩니다.",
ENTP:"🚀 토론과 새로운 도전을 좋아합니다.",
ESTJ:"🏆 책임감 있는 리더형입니다.",
ESFJ:"😊 친구들과 협력을 중요하게 생각합니다.",
ENFJ:"🌟 사람을 이끄는 따뜻한 리더입니다.",
ENTJ:"👑 목표 달성이 강한 리더형입니다."

};



const jobs={

ISTJ:["공무원","회계사","은행원","경찰","관리자"],

ISFJ:["교사","간호사","상담사","사회복지사","보육교사"],

INFJ:["심리상담사","작가","디자이너","교사","사회복지사"],

INTJ:["개발자","연구원","데이터 분석가","과학자","컨설턴트"],

ISTP:["엔지니어","기술자","소방관","정비사","파일럿"],

ISFP:["디자이너","사진작가","음악가","예술가","플로리스트"],

INFP:["작가","콘텐츠 제작자","상담사","번역가","디자이너"],

INTP:["프로그래머","연구원","교수","발명가","분석가"],

ESTP:["운동선수","경찰","영업직","방송인","소방관"],

ESFP:["배우","가수","방송인","행사기획자","승무원"],

ENFP:["콘텐츠 크리에이터","마케터","디자이너","교사","방송인"],

ENTP:["기업가","변호사","기획자","마케터","MC"],

ESTJ:["관리자","공무원","경영자","경찰","판사"],

ESFJ:["교사","간호사","인사담당자","의료직","사회복지사"],

ENFJ:["강사","교사","상담사","팀장","인사담당자"],

ENTJ:["CEO","경영컨설턴트","변호사","프로젝트 매니저","임원"]

};



document.getElementById("test").style.display="none";

document.getElementById("result").style.display="block";


mbti.innerHTML=result;


desc.innerHTML=descriptions[result];



job.innerHTML=

`
<h3>💼 ${result}에게 추천하는 직업</h3>
<br>

${jobs[result].map(job=>"✔ "+job).join("<br>")}

`;

}



</script>


</body>
</html>
